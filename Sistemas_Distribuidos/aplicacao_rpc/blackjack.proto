syntax = "proto3";

package blackjack;

message Card {
  string suit = 1;
  string value = 2;
}

message Hand {
  repeated Card cards = 1;
}

message GameRequest {
  string player_name = 1;
}

message GameResponse {
  string message = 1;
  Hand player_hand = 2;
  Hand dealer_hand = 3;
  int32 player_score = 4;
  int32 dealer_score = 5;
  bool game_over = 6;
}

service Blackjack {
  rpc StartGame(GameRequest) returns (GameResponse);
  rpc Hit(GameRequest) returns (GameResponse);
  rpc Stand(GameRequest) returns (GameResponse);
}
